<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="robots" content="noindex">
<title>Actrix OG card (render source)</title>
<style>
  @font-face{font-family:"Marcellus";src:url("/assets/fonts/Marcellus-Regular.ttf") format("truetype");font-weight:400;font-display:block}
  @font-face{font-family:"Merom Sans";src:url("/assets/fonts/MeromSans-Regular.ttf") format("truetype");font-weight:400;font-display:block}
  @font-face{font-family:"Merom Sans";src:url("/assets/fonts/MeromSans-SemiBold.ttf") format("truetype");font-weight:700;font-display:block}
  @font-face{font-family:"Merom Sans";src:url("/assets/fonts/MeromSans-Bold.ttf") format("truetype");font-weight:850;font-display:block}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{
    font-family:"Merom Sans","Segoe UI",sans-serif;
    color:#DEE6EE;-webkit-font-smoothing:antialiased;
    background:
      radial-gradient(circle at 15% 2%, rgba(230,210,194,.20), transparent 44%),
      radial-gradient(circle at 92% 96%, rgba(158,191,218,.10), transparent 42%),
      linear-gradient(135deg,#2b261f 0%,#27231d 46%,#1b1813 100%);
    position:relative;
  }
  .grid{position:absolute;inset:0;
    background-image:linear-gradient(rgba(222,230,238,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(222,230,238,.032) 1px,transparent 1px);
    background-size:50px 50px;
    -webkit-mask-image:radial-gradient(circle at 28% 16%,#000,transparent 80%);}
  .edge{position:absolute;inset:0;border:1px solid rgba(230,210,194,.10);border-radius:0}
  .signal{position:absolute;right:-40px;top:0;width:620px;height:630px;opacity:.5}
  .wrap{position:relative;height:100%;padding:76px 84px;display:flex;flex-direction:column;justify-content:space-between;z-index:2}
  .brand{display:flex;align-items:center;gap:18px}
  .mark{width:66px;height:66px;border-radius:17px;background:linear-gradient(135deg,rgba(230,210,194,.24),rgba(62,74,86,.40));border:1px solid rgba(230,210,194,.36);display:grid;place-items:center;box-shadow:inset 0 1px 0 rgba(255,255,255,.10)}
  .brand b{display:block;font-family:"Marcellus",serif;font-size:36px;line-height:1;font-weight:400;letter-spacing:.01em}
  .brand .eyebrow{display:block;color:#e3bf6d;font-size:15.5px;font-weight:850;letter-spacing:.24em;text-transform:uppercase;margin-top:7px}
  h1{font-family:"Marcellus",serif;font-weight:400;font-size:80px;line-height:1.015;letter-spacing:-.02em;max-width:920px}
  h1 .amber{color:#e3bf6d}
  .sub{margin-top:26px;color:#B6C4D1;font-size:26px;line-height:1.42;max-width:800px}
  .foot{display:flex;align-items:center;gap:14px;font-size:23px;font-weight:850}
  .chip{border:1px solid rgba(222,230,238,.18);background:rgba(222,230,238,.045);border-radius:13px;padding:13px 20px;display:inline-flex;align-items:center;gap:10px}
  .chip.primary{border-color:rgba(227,191,109,.55);background:linear-gradient(180deg,rgba(227,191,109,.16),rgba(227,191,109,.06));color:#f0d49a}
  .dot{width:9px;height:9px;border-radius:50%;background:#e3bf6d;box-shadow:0 0 14px rgba(227,191,109,.7)}
</style>
</head>
<body>
  <div class="grid"></div>
  <!-- signal path echo of the site's agent-stack motif -->
  <svg class="signal" viewBox="0 0 620 630" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M40 470 C190 400 250 470 360 350 C470 230 520 270 640 150" stroke="#efe3cc" stroke-opacity=".10" stroke-width="1.4"/>
    <path d="M20 520 C180 450 250 520 380 400" stroke="#efe3cc" stroke-opacity=".08" stroke-width="1.4"/>
    <path d="M60 430 C210 360 270 430 380 312 C500 188 560 232 690 96" stroke="#f0b762" stroke-width="5" stroke-linecap="round" stroke-dasharray="16 20" opacity=".55"/>
    <circle cx="380" cy="312" r="7" fill="#e3bf6d" opacity=".8"/>
    <circle cx="60" cy="430" r="6" fill="#9ebfda" opacity=".7"/>
  </svg>
  <div class="wrap">
    <div class="brand">
      <span class="mark">
        <img src="/assets/actrix-logo-mark.png" alt="" width="50" height="50" style="display:block">
      </span>
      <span><b>Actrix</b><span class="eyebrow">Idaho AI Implementation Firm</span></span>
    </div>
    <div>
      <h1>Custom AI agent stacks for <span class="amber">Idaho companies.</span></h1>
      <p class="sub">Custom agents, workflow automation, support, and training — built and installed across Idaho, with human approval where judgment matters.</p>
    </div>
    <div class="foot">
      <span class="chip primary"><span class="dot"></span>(208) 366-6111</span>
      <span class="chip">samuel@actrix.me</span>
      <span class="chip">actrix.me</span>
    </div>
  </div>
</body>
</html>
